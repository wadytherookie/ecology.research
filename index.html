<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f1ea; color: #1a1a1a; font-family: 'Cairo', sans-serif; }
        .header-section { border-bottom: 4px double #333; padding: 20px 0; margin-bottom: 30px; text-align: center; }
        
        .newspaper-title { font-size: 3.5rem; font-weight: 900; margin: 0; }
        .article-odd { background: #fff; padding: 15px; border: 1px solid #ccc; box-shadow: -5px 5px 0px #ddd; margin-bottom: 35px; }
        .featured-image { width: 100%; height: 200px; object-fit: cover; filter: sepia(0.2); margin-bottom: 15px; }
        .btn-read { background: #333; color: white; border: none; padding: 8px 20px; cursor: pointer; display: inline-block; margin-top: 10px; }
        
        #ticker-wrapper { background: #333; color: white; padding: 10px; overflow: hidden; margin-bottom: 20px; position: relative; }
        #ticker-text { display: inline-block; white-space: nowrap; padding-left: 100%; animation: scroll-left 20s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .school-logo { 
            max-width: 150px; 
            margin-bottom: 15px; 
            filter: none; 
            drop-shadow: 0px 4px 6px rgba(0,0,0,0.1); 
        }
    </style>
    <link rel="icon" type="image/png" href="logo-removebg-preview.png">
</head>
<body>

<header class="header-section">
    <div id="ticker-wrapper">
        <div id="ticker-text">جاري تحميل الأخبار...</div>
    </div>
    <div class="container">
        <img src="logo-removebg-preview.png" class="school-logo" alt="Logo">
        <h1 class="newspaper-title">صحيفة دار الذكر الثانوية</h1>
        <p>جدة، المملكة العربية السعودية • <span id="current-date"></span></p>
    </div>
</header>

<div class="container"><div class="row" id="main-news-container"></div></div>

<div class="modal fade" id="articleModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background: #f4f1ea;">
      <div class="modal-header">
        <h5 id="m-title" style="font-weight: bold;"></h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="margin: 0;">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" style="display: flex; flex-direction: column; align-items: center;">
        <img id="m-img" class="img-fluid" style="margin-bottom: 10px; height: 300px; object-fit: cover;">
        <div style="margin-bottom: 20px;">
            <button class="btn btn-secondary" onclick="changeSlide(1)">التالي </button>
            <button class="btn btn-secondary" onclick="changeSlide(-1)"> السابق</button>
        </div>
        <p id="m-content" style="width: 100%; text-align: justify;"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-dark" data-dismiss="modal">إغلاق</button>
      </div>
    </div>
  </div>
</div>

<footer style="text-align: center; padding: 40px; background: #0d0d0d; color: #f5f3f5; margin-top: 50px; font-family: 'Cairo', sans-serif;">
    <p>&copy; 2026 صحيفة دار الذكر. جميع الحقوق محفوظة.</p>
    <p>تصميم وتطوير: محمد مصطفى الشريف</p>
</footer>
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Get Gregorian Date using standard Arabic
// 1. Gregorian Date (Standard)
const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };

// 1. Gregorian Engine
const gregorianFormatter = new Intl.DateTimeFormat('ar-ar', dateOptions);

// 2. Hijri Engine (Explicitly setting the calendar)
const hijriFormatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', dateOptions);

const gregorianDate = gregorianFormatter.format(new Date());
const hijriDate = hijriFormatter.format(new Date());

document.getElementById('current-date').innerText = `${gregorianDate} • ${hijriDate}`;

    let currentImgIndex = 0;
    let modalImages = [];

    async function syncNewspaper() {
        try {
            const response = await fetch('https://daralthikrnewspaper.onrender.com/status?t=' + new Date().getTime());
            
            // If the response is not ok, stop here to avoid clearing the screen
            if (!response.ok) throw new Error("API not responding");

            const data = await response.json();
            
            // Only clear and update IF we successfully got new data
            const mainRow = document.getElementById('main-news-container');
            mainRow.innerHTML = ''; 
            
            document.getElementById('ticker-text').innerText = data.ticker_text;

            data.articles.forEach((art) => {
                const col = document.createElement('div');
                col.className = 'col-md-4';
                col.innerHTML = `
                    <div class="article-odd">
                        <img src="${art.image_url}" class="featured-image">
                        <h3>${art.title}</h3>
                        <p>${art.description}</p>
                    </div>`;
                
                const btn = document.createElement('button');
                btn.className = 'btn-read';
                btn.innerText = 'اقرأ المزيد ←';
                btn.onclick = () => showSub(art.title, art.image_url, art.sub_image_1, art.sub_image_2, art.sub_image_3, art.sub_image_4, art.content);
                
                col.querySelector('.article-odd').appendChild(btn);
                mainRow.appendChild(col);
            });
            console.log("News updated successfully");
        } catch (e) { 
            console.log("Connection Failed or Server Sleeping. Keeping existing content."); 
        }
    }

    function showSub(title, img, s1, s2, s3, s4, content) {
        modalImages = [img, s1, s2, s3, s4].filter(i => i && i !== "null" && i !== null);
        currentImgIndex = 0;
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-img').src = modalImages[currentImgIndex];
        document.getElementById('m-content').innerText = content;
        $('#articleModal').modal('show');
    }

    function changeSlide(dir) {
        if(modalImages.length > 0) {
            currentImgIndex = (currentImgIndex + dir + modalImages.length) % modalImages.length;
            document.getElementById('m-img').src = modalImages[currentImgIndex];
        }
    }

    // Run once on load
    window.onload = syncNewspaper;

    // Refresh every 10 minutes (600,000 milliseconds)
    setInterval(syncNewspaper, 60000);
</script>
</body>
</html>
